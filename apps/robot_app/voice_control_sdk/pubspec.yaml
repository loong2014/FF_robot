name: voice_control_sdk
description: Flutter plugin for wake-word detection and command recognition.
publish_to: "none"
version: 0.0.1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  path: ^1.9.0
  path_provider: ^2.1.5
  sherpa_onnx: ^1.12.36

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.xinzhang.voice_control_sdk
        pluginClass: VoiceControlSdkPlugin
      ios:
        pluginClass: VoiceControlSdkPlugin
  assets:
    - assets/voice_models/kws/sherpa-onnx-kws-zipformer-zh-en-3M-2025-12-20/
    - assets/voice_models/asr/sherpa-onnx-streaming-zipformer-small-bilingual-zh-en-2023-02-16/
    - assets/voice_models/vad/
